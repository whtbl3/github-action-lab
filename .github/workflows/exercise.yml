name: System Pipeline & Development

on:
  push: 
    branches: ["main", "dev"]

env:
  APP_NAME: "MyPublicApp"
  DEBUG_MODE: "true"

jobs:
  system-check:
    runs-on: ubuntu-latest
    steps:
      - name: Report Info
        run: |
          echo "Repo: $GITHUB_REPOSITORY | User: $GITHUB_ACTOR"
          echo "OS: $RUNNER_OS"
      
      - name: Security Scan
        if: env.DEBUG_MODE == 'true'
        run: echo "Token loaded for security scan..."

  deploy-dev:
    needs: system-check 
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Deploy to dev
        env:
          DB_PASSWORD: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          echo "Deploying ${{ env.APP_NAME }} v${{ vars.APP_VERSION }} to ${{ vars.DEPLOY_URL }}"
          echo "Connecting to DB with password: $DB_PASSWORD"
  
  deploy-prod:
    needs: system-check
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Deploy to Production
        env:
          DB_PASSWORD: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          echo "🚀 PROD DEPLOY: ${{ env.APP_NAME }} v${{ vars.APP_VERSION }}"
          echo "🌍 URL: ${{ vars.DEPLOY_URL }}"
