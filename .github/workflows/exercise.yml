name: System Health Check

on: push

env:
  APP_NAME: "MySecretApp"
  DEBUG_MODE: "true"

jobs:
  system-discovery:
    runs-on: ubuntu-latest
    steps:
      - name: Report Repo Info
        run: |
          echo "Repo: $GITHUB_REPOSITORY"
          echo "User: $GITHUB_ACTOR"

      - name: Check Runner OS
        run: |
          echo "Hệ điều hành là: $RUNNER_OS"

      - name: Local Step Variable
        env:
          TEMP_ID: "9999"
        run: echo "Processing ID $TEMP_ID for $APP_NAME"

  security-check:
    runs-on: ubuntu-latest
    steps:
      - name: Load Security Token
        if: env.DEBUG_MODE == 'true'
        env:
          MY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "Token has been loaded for security scan"

  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Database
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOSTS: 'HOST_TEST'
          DB_USER: 'USER_TEST'
        run: |
          echo "Connecting to database..."
          # Dùng biến trong lệnh thực tế, ví dụ:
          echo "psql -h $DB_HOST -U $DB_USER -W $DB_PASSWORD"

