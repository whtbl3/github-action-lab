name: System Pipeline & Development (Trunk-based)

run-name: Pipeline

on:
  push: 
    branches: ["main"] # Chỉ tập trung vào một nhánh duy nhất

env:
  APP_NAME: "MyPublicApp"
  DEBUG_MODE: "true"

jobs:
  system-check:
    runs-on: ubuntu-latest
    steps:
      - name: Report Info
        run: |
          echo "Repo: $GITHUB_REPOSITORY | User: $GITHUB_ACTOR"
          echo "OS: $RUNNER_OS"
      
      - name: Security Scan
        if: env.DEBUG_MODE == 'true'
        run: echo "Token loaded for security scan..."

  deploy-dev:
    needs: system-check # Chạy sau khi check xong
    runs-on: ubuntu-latest
    environment: dev    # Tự động chạy vì dev không có Protection Rule
    steps:
      - name: Deploy to dev
        env:
          DB_PASSWORD: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          echo "Deploying ${{ env.APP_NAME }} v${{ vars.APP_VERSION }} to ${{ vars.DEPLOY_URL }}"

  deploy-prod:
    needs: deploy-dev   # QUAN TRỌNG: Chỉ chạy sau khi Deploy Dev thành công
    runs-on: ubuntu-latest
    environment: prod   # Ở đây GitHub sẽ dừng lại chờ bạn Approve + Đợi 1 phút
    steps:
      - name: Deploy to Production
        env:
          DB_PASSWORD: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          echo "🚀 PROD DEPLOY: ${{ env.APP_NAME }} v${{ vars.APP_VERSION }}"
          echo "🌍 URL: ${{ vars.DEPLOY_URL }}"